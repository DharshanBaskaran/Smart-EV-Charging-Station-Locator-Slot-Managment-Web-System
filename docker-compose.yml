# ─── Valence Docker Compose ─────────────────────────────────────────────────
# Run: docker-compose up -d
# Stop: docker-compose down

version: '3.8'

services:
  app:
    build: .
    container_name: valence-app
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
