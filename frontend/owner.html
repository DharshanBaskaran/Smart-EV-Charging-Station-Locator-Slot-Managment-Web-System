<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valence — Station Owner Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Hamburger Button ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px;
      padding: 6px; border-radius: 8px; transition: background 0.2s;
      flex-shrink: 0;
    }
    .hamburger-btn:hover { background: var(--surface2); }
    .hamburger-btn span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

    /* ── Side Drawer ── */
    .nav-drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 8888; backdrop-filter: blur(2px); }
    .nav-drawer-overlay.open { display: block; }
    .nav-drawer {
      position: fixed; top: 0; left: -280px; bottom: 0; width: 260px;
      background: var(--surface); border-right: 1px solid var(--surface2);
      z-index: 8889; transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; padding: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.3);
    }
    .nav-drawer.open { left: 0; }
    .nav-drawer-header { padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--surface2); display: flex; align-items: center; justify-content: space-between; }
    .nav-drawer-logo { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .nav-drawer-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 4px; border-radius: 6px; transition: all 0.15s; }
    .nav-drawer-close:hover { background: var(--surface2); color: var(--text); }
    .nav-drawer-links { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .nav-drawer-links a {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 0.85rem; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600; color: var(--text-muted);
      text-decoration: none; transition: all 0.15s; border: 1px solid transparent;
    }
    .nav-drawer-links a:hover { background: var(--surface2); color: var(--text); }
    .nav-drawer-links a.active { background: rgba(0,230,118,0.12); color: var(--accent); border-color: rgba(0,230,118,0.2); }
    .nav-drawer-links .nav-icon { font-size: 1.1rem; width: 1.4rem; text-align: center; }
    .nav-drawer-divider { height: 1px; background: var(--surface2); margin: 0.5rem 0; }

    .owner-container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .owner-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    .owner-header h1 { font-size: 1.4rem; font-weight: 800; }

    .owner-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
    .ostat { background: var(--surface); border: 1px solid var(--surface2); border-radius: 12px; padding: 0.8rem; text-align: center; }
    .ostat .label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; }
    .ostat .val { font-size: 1.3rem; font-weight: 800; color: var(--accent); margin-top: 0.15rem; }

    .station-owner-card {
      background: var(--surface); border: 1px solid var(--surface2); border-radius: 14px;
      padding: 1.2rem; margin-bottom: 0.75rem; transition: border-color 0.2s;
    }
    .station-owner-card:hover { border-color: rgba(0,230,118,0.3); }
    .soc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .soc-name { font-weight: 800; font-size: 1rem; }
    .soc-addr { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }

    .port-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.4rem; margin-top: 0.6rem; }
    .port-mini {
      background: var(--surface2); border-radius: 8px; padding: 0.5rem;
      display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem;
    }
    .port-mini .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.3rem; }
    .dot.free { background: #00e676; }
    .dot.occupied { background: #00b0ff; }
    .dot.defective { background: #ff5252; }

    .util-bar { height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; margin-top: 0.4rem; }
    .util-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #00e676, #00b0ff); transition: width 0.3s; }

    .metric-row { display: flex; gap: 1.5rem; margin-top: 0.5rem; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }
    .metric-row strong { color: var(--text); }

    @media (max-width: 640px) {
      .owner-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── Side Nav Drawer ── -->
<div class="nav-drawer-overlay" id="nav-drawer-overlay" onclick="closeNavDrawer()"></div>
<div class="nav-drawer" id="nav-drawer">
  <div class="nav-drawer-header">
    <span class="nav-drawer-logo">⚡ Valence</span>
    <button class="nav-drawer-close" onclick="closeNavDrawer()">✕</button>
  </div>
  <div class="nav-drawer-links">
    <a href="/dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="/"><span class="nav-icon">🗺</span> Map</a>
    <a href="/history.html"><span class="nav-icon">⚡</span> History</a>
    <div class="nav-drawer-divider"></div>
    <a href="/fleet.html"><span class="nav-icon">🚗</span> Fleet</a>
    <a href="/owner.html" class="active"><span class="nav-icon">🏢</span> Owner Portal</a>
  </div>
</div>

<!-- ── Custom Alert Modal ── -->
<div id="owner-alert-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--surface2);border-radius:14px;padding:1.5rem;max-width:340px;width:90%;text-align:center;">
    <div id="owner-alert-icon" style="font-size:2.5rem;margin-bottom:0.5rem;">ℹ️</div>
    <h3 style="margin-bottom:0.5rem;">Notification</h3>
    <p id="owner-alert-msg" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;"></p>
    <button onclick="document.getElementById('owner-alert-modal').style.display='none'" style="padding:0.5rem 2rem;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:700;cursor:pointer;">OK</button>
  </div>
</div>

  <div class="owner-container">
    <div class="owner-header">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <button class="hamburger-btn" onclick="openNavDrawer()" title="Menu">
          <span></span><span></span><span></span>
        </button>
        <h1>🏢 Station Owner Portal</h1>
      </div>
      <div style="display:flex; gap:0.75rem;">
        <a href="/dashboard.html" class="btn btn-small btn-secondary">← Dashboard</a>
        <a href="/" class="btn btn-small btn-secondary">← Map</a>
      </div>
    </div>

    <div class="owner-stats" id="owner-stats">
      <div class="ostat"><div class="label">My Stations</div><div class="val" id="os-stations">—</div></div>
      <div class="ostat"><div class="label">Total Ports</div><div class="val" id="os-ports">—</div></div>
      <div class="ostat"><div class="label">Avg Utilization</div><div class="val" id="os-util">—</div></div>
      <div class="ostat"><div class="label">Total Revenue</div><div class="val" id="os-revenue">—</div></div>
      <div class="ostat"><div class="label">Avg Rating</div><div class="val" id="os-rating">—</div></div>
    </div>

    <div id="owner-station-list">
      <div style="text-align:center; padding:2rem; color:var(--text-muted);">⏳ Loading your stations...</div>
    </div>

    <div style="text-align:center; margin-top:1.5rem; padding:1rem; background:var(--surface); border-radius:12px; border:1px solid var(--surface2);">
      <p style="font-size:0.85rem; color:var(--text-muted);">Want to add a new station?</p>
      <a href="/" class="btn btn-primary" style="margin-top:0.5rem;">Go to Map → Add Station</a>
    </div>
  </div>

  <script>
    // Override alert()
    window.alert = function(msg) {
      const modal = document.getElementById('owner-alert-modal');
      const lc = (msg || '').toLowerCase();
      document.getElementById('owner-alert-icon').textContent = (lc.includes('error') || lc.includes('fail')) ? '⚠️' : 'ℹ️';
      document.getElementById('owner-alert-msg').textContent = msg;
      modal.style.display = 'flex';
    };

    function openNavDrawer() {
      document.getElementById('nav-drawer').classList.add('open');
      document.getElementById('nav-drawer-overlay').classList.add('open');
    }
    function closeNavDrawer() {
      document.getElementById('nav-drawer').classList.remove('open');
      document.getElementById('nav-drawer-overlay').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeNavDrawer(); });

    const API = window.location.origin + '/api';
    const token = localStorage.getItem('valence_token');
    if (!token) { window.location.href = '/login.html'; throw new Error('redirect'); }
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

    async function loadOwnerStations() {
      try {
        const res = await fetch(API + '/owner/stations', { headers: authHeaders() });
        const data = await res.json();
        const { stats, stations } = data;

        document.getElementById('os-stations').textContent = stats.totalStations;
        document.getElementById('os-ports').textContent = stats.totalPorts;
        document.getElementById('os-util').textContent = stats.avgUtilization + '%';
        document.getElementById('os-revenue').textContent = '₹' + stats.totalRevenue.toLocaleString();
        document.getElementById('os-rating').textContent = stats.avgRating + ' ⭐';

        if (stations.length === 0) {
          document.getElementById('owner-station-list').innerHTML =
            '<div style="text-align:center; padding:2rem; color:var(--text-muted);">🏢 No stations owned yet. Add a station from the map to see it here!</div>';
          return;
        }

        document.getElementById('owner-station-list').innerHTML = stations.map(s => `
          <div class="station-owner-card">
            <div class="soc-top">
              <div>
                <div class="soc-name">⚡ ${s.name}</div>
                <div class="soc-addr">${s.address} · ${s.city}</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:1.1rem; font-weight:800; color:var(--accent);">₹${s.estimatedRevenue.toLocaleString()}</div>
                <div style="font-size:0.7rem; color:var(--text-muted);">Est. Revenue</div>
              </div>
            </div>

            <div class="metric-row">
              <span>🔌 Ports: <strong>${s.totalPorts}</strong></span>
              <span>🟢 Free: <strong>${s.freePorts}</strong></span>
              <span>🔵 Occupied: <strong>${s.occupiedPorts}</strong></span>
              <span>🔴 Defective: <strong>${s.defectivePorts}</strong></span>
              <span>⭐ ${s.avgRating.toFixed(1)} (${s.totalReviews} reviews)</span>
            </div>

            <div class="util-bar">
              <div class="util-fill" style="width: ${s.utilization}%;"></div>
            </div>
            <div style="font-size:0.7rem; color:var(--text-muted); margin-top:0.2rem;">Utilization: ${s.utilization}%</div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('owner-station-list').innerHTML =
          '<div style="text-align:center; padding:2rem; color:var(--danger);">❌ Error: ' + e.message + '</div>';
      }
    }

    loadOwnerStations();
  </script>
</body>
</html>
